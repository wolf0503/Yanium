<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yanium — Black Hole Hero Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=Tenor+Sans&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020202;
    color: #E0E0E0;
    font-family: 'Tenor Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .brand-tag {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.5em;
    color: rgba(212,175,55,0.5);
    margin-bottom: 16px;
    animation: fadeUp 1.5s ease forwards;
    opacity: 0;
    animation-delay: 0.5s;
  }

  .headline {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 5vw, 72px);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-align: center;
    line-height: 1.1;
    animation: fadeUp 1.5s ease forwards;
    opacity: 0;
    animation-delay: 0.8s;
  }

  .headline .white { color: #D0D0D0; }
  .headline .gold  { color: #D4AF37; }

  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 1.8vw, 20px);
    letter-spacing: 0.12em;
    color: rgba(224,224,224,0.45);
    margin-top: 18px;
    text-align: center;
    animation: fadeUp 1.5s ease forwards;
    opacity: 0;
    animation-delay: 1.1s;
  }

  .element-box {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 68px; height: 68px;
    border: 1px solid rgba(212,175,55,0.55);
    transform: translate(-50%, -50%) translateY(-220px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 11;
    animation: fadeIn 2s ease forwards;
    opacity: 0;
    animation-delay: 2s;
    background: rgba(212,175,55,0.03);
  }
  .element-box::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px;
    width: 10px; height: 10px;
    border-top: 1.5px solid #D4AF37;
    border-left: 1.5px solid #D4AF37;
  }
  .element-box::after {
    content: '';
    position: absolute;
    bottom: -2px; right: -2px;
    width: 10px; height: 10px;
    border-bottom: 1.5px solid #D4AF37;
    border-right: 1.5px solid #D4AF37;
  }
  .el-num { font-family: 'Cinzel', serif; font-size: 8px; color: rgba(212,175,55,0.6); letter-spacing: 0.1em; position: absolute; top: 5px; left: 7px; }
  .el-sym { font-family: 'Cinzel', serif; font-size: 26px; color: #D4AF37; line-height: 1; }
  .el-name { font-family: 'Cinzel', serif; font-size: 5.5px; letter-spacing: 0.2em; color: rgba(212,175,55,0.65); }
  .el-mass { font-family: 'Cinzel', serif; font-size: 5.5px; letter-spacing: 0.1em; color: rgba(212,175,55,0.45); position: absolute; bottom: 5px; }

  .cta {
    margin-top: 40px;
    pointer-events: all;
    padding: 12px 32px;
    border: 1px solid rgba(212,175,55,0.5);
    background: rgba(212,175,55,0.06);
    color: #D4AF37;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: fadeUp 1.5s ease forwards;
    opacity: 0;
    animation-delay: 1.5s;
  }
  .cta:hover { background: rgba(212,175,55,0.14); border-color: #D4AF37; }

  .scroll-hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeIn 2s ease forwards;
    opacity: 0;
    animation-delay: 2.5s;
    z-index: 10;
  }
  .scroll-hint span {
    font-family: 'Tenor Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(224,224,224,0.25);
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(180deg, rgba(212,175,55,0.5), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity: 0.4; transform: scaleY(1); }
    50%     { opacity: 1; transform: scaleY(1.1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="element-box">
  <div class="el-num">71</div>
  <div class="el-sym">Yn</div>
  <div class="el-name">YANIUM</div>
  <div class="el-mass">288.07</div>
</div>

<div class="overlay">
  <div style="height: 260px"></div>
  <div class="brand-tag">// VELOCITY OF INTELLIGENCE</div>
  <h1 class="headline">
    <span class="white">WHERE INTELLIGENCE</span><br>
    <span class="gold">COLLAPSES INTO POWER</span>
  </h1>
  <p class="sub">Premium AI-native development. Built for those who refuse to wait.</p>
  <button class="cta">INITIATE PROTOCOL</button>
</div>

<div class="scroll-hint">
  <span>SCROLL TO EXPLORE</span>
  <div class="scroll-line"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── STARS ─────────────────────────────────────────────
const STAR_COUNT = 320;
const stars = Array.from({length: STAR_COUNT}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.6 + 0.2,
  twinkle: Math.random() * Math.PI * 2,
  twinkleSpeed: 0.008 + Math.random() * 0.012,
}));

// ── ACCRETION DISK PARTICLES ───────────────────────────
const DISK_COUNT = 1800;
const diskParticles = Array.from({length: DISK_COUNT}, () => {
  const band  = Math.random();          // 0 = inner, 1 = outer
  const r     = 90 + band * 260;        // pixel radius
  const theta = Math.random() * Math.PI * 2;
  const speed = (0.18 + (1 - band) * 0.14) * (Math.random() > 0.5 ? 1 : -1) * 0.6;
  return {
    r,
    theta,
    speed,
    band,
    size: 0.5 + Math.random() * 1.6,
    alpha: 0.3 + Math.random() * 0.7,
    // colour mix: inner = bright gold/white, outer = deeper amber/orange
    hue: 42 + band * 20,          // gold → amber
    sat: 70 + (1-band) * 30,
    lit: 80 - band * 35,
  };
});

// ── INFALLING STREAMS (matter jets into event horizon) ─
const STREAM_COUNT = 120;
const streams = Array.from({length: STREAM_COUNT}, (_, i) => ({
  angle: (i / STREAM_COUNT) * Math.PI * 2,
  r: 200 + Math.random() * 300,
  progress: Math.random(),
  speed: 0.003 + Math.random() * 0.004,
  alpha: 0.15 + Math.random() * 0.35,
}));

// ── POLAR JET PARTICLES ───────────────────────────────
const JET_COUNT = 200;
const jets = Array.from({length: JET_COUNT}, () => ({
  side:  Math.random() > 0.5 ? 1 : -1,
  x:     (Math.random() - 0.5) * 18,
  y:     80 + Math.random() * 400,
  speed: 1.2 + Math.random() * 2.5,
  alpha: 0.4 + Math.random() * 0.6,
  size:  0.8 + Math.random() * 1.8,
  drift: (Math.random() - 0.5) * 0.5,
}));

// ── LENSING RING ──────────────────────────────────────
let glowPulse = 0;

let t = 0;

function draw() {
  t += 0.008;
  glowPulse = Math.sin(t * 0.7) * 0.5 + 0.5;

  ctx.clearRect(0, 0, W, H);

  // deep space bg gradient
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H));
  bg.addColorStop(0,    'rgba(8,4,2,1)');
  bg.addColorStop(0.35, 'rgba(4,2,4,1)');
  bg.addColorStop(1,    'rgba(1,1,2,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── draw stars ──
  stars.forEach(s => {
    s.twinkle += s.twinkleSpeed;
    const a = s.a * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  // ── outer ambient glow ──
  const outerGlow = ctx.createRadialGradient(cx, cy, 80, cx, cy, 500);
  outerGlow.addColorStop(0,   `rgba(212,175,55,${0.06 + glowPulse * 0.04})`);
  outerGlow.addColorStop(0.4, `rgba(100,60,10,${0.03 + glowPulse * 0.02})`);
  outerGlow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = outerGlow;
  ctx.fillRect(0, 0, W, H);

  // ── infalling streams ──
  streams.forEach(s => {
    s.progress += s.speed;
    if (s.progress > 1) s.progress = 0;
    const radius = s.r * (1 - s.progress);
    const ix = cx + Math.cos(s.angle + t * 0.1) * radius;
    const iy = cy + Math.sin(s.angle + t * 0.1) * radius * 0.32;
    const sz = s.progress;
    ctx.beginPath();
    ctx.arc(ix, iy, 0.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212,175,55,${s.alpha * sz * 0.7})`;
    ctx.fill();
  });

  // ── disk back-half (behind event horizon) ──
  diskParticles.forEach(p => {
    p.theta += p.speed * 0.016;
    const x = cx + Math.cos(p.theta) * p.r;
    const y = cy + Math.sin(p.theta) * p.r * 0.3;
    if (Math.sin(p.theta) > 0) return; // only back half
    const depth = (1 - p.band) * 0.6 + 0.4;
    ctx.beginPath();
    ctx.arc(x, y, p.size * depth, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha * 0.55})`;
    ctx.fill();
  });

  // ── polar jets (behind) ──
  jets.forEach(j => {
    j.y -= j.speed;
    if (j.y < 0) { j.y = 80 + Math.random() * 300; j.x = (Math.random()-0.5)*18; }
    const jy = cy - j.y * j.side;
    const jx = cx + j.x + Math.sin(t + j.y * 0.05) * j.drift * 3;
    const frac = j.y / 400;
    const jalpha = j.alpha * (1 - frac);
    ctx.beginPath();
    ctx.arc(jx, jy, j.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,240,255,${jalpha * 0.6})`;
    ctx.fill();
  });

  // ── jet glow columns ──
  for (let side of [-1, 1]) {
    const jg = ctx.createLinearGradient(cx, cy, cx, cy - side * 340);
    jg.addColorStop(0,    `rgba(0,240,255,${0.0})`);
    jg.addColorStop(0.1,  `rgba(0,240,255,${0.12 + glowPulse * 0.06})`);
    jg.addColorStop(0.5,  `rgba(80,220,255,${0.06})`);
    jg.addColorStop(1,    'rgba(0,240,255,0)');
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, 14, 340, 0, 0, Math.PI*2);
    ctx.fillStyle = jg;
    ctx.fill();
    ctx.restore();
  }

  // ── event horizon ──
  const ehR = 74;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, ehR, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // ── photon ring / gravitational lensing ──
  for (let ring = 3; ring >= 0; ring--) {
    const ringAlpha = (0.6 - ring * 0.12) * (0.85 + glowPulse * 0.15);
    const ringW = 4 - ring * 0.5;
    const ringGrad = ctx.createRadialGradient(cx, cy, ehR - 2, cx, cy, ehR + 18 + ring * 8);
    ringGrad.addColorStop(0,   `rgba(255,240,140,${ringAlpha})`);
    ringGrad.addColorStop(0.3, `rgba(212,175,55,${ringAlpha * 0.7})`);
    ringGrad.addColorStop(0.7, `rgba(180,120,20,${ringAlpha * 0.3})`);
    ringGrad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, ehR + 6 + ring * 5, 0, Math.PI * 2);
    ctx.strokeStyle = ringGrad;
    ctx.lineWidth = ringW;
    ctx.stroke();
  }

  // ── photon ring crisp line ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, ehR + 4, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,245,160,${0.7 + glowPulse * 0.3})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // ── re-mask event horizon over lensing ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, ehR - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // ── disk front-half (in front of event horizon) ──
  diskParticles.forEach(p => {
    const x = cx + Math.cos(p.theta) * p.r;
    const y = cy + Math.sin(p.theta) * p.r * 0.3;
    if (Math.sin(p.theta) <= 0) return;
    const depth = (1 - p.band) * 0.5 + 0.5;
    const fade  = Math.max(0, Math.abs(x - cx) / (p.r + 1));
    ctx.beginPath();
    ctx.arc(x, y, p.size * depth, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha * fade})`;
    ctx.fill();
  });

  // ── disk glow band ──
  const diskGrad = ctx.createRadialGradient(cx, cy, 60, cx, cy, 380);
  diskGrad.addColorStop(0,    `rgba(255,230,80,${0.04 + glowPulse * 0.03})`);
  diskGrad.addColorStop(0.15, `rgba(212,175,55,${0.06 + glowPulse * 0.04})`);
  diskGrad.addColorStop(0.5,  `rgba(160,100,10,0.025)`);
  diskGrad.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.save();
  ctx.scale(1, 0.32);
  ctx.translate(0, cy / 0.32 * (1 - 0.32));
  ctx.beginPath();
  ctx.arc(cx, cy, 380, 0, Math.PI * 2);
  ctx.fillStyle = diskGrad;
  ctx.fill();
  ctx.restore();

  // ── subtle vignette ──
  const vig = ctx.createRadialGradient(cx, cy, H * 0.3, cx, cy, H * 0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
